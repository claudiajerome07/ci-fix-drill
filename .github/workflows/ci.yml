name: CI Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Use npm ci for reproducible installs in CI
      - name: Install dependencies
        run: npm ci

  test:
    runs-on: ubuntu-latest

    # Ensure the install job completes first
    needs: install

    steps:
      # Each job runs on a fresh runner, so checkout is required again
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install dependencies on this runner before testing
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test